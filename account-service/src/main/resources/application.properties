server.port=8082
spring.application.name=account-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/account_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:account_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:account_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

management.endpoints.web.exposure.include=health,info

app.errors.include-details=${APP_ERRORS_INCLUDE_DETAILS:true}